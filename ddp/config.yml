project: "iapytoo"
run: "run"

dataset:
  path: "../data"
  n_steps_by_batch: 10
  num_workers: 2
  batch_size: 64

training:
  learning_rate: 1e-4
  loss: "nll"
  optimizer: "adam"
  scheduler: "step"
  epochs: 2

metrics: 
  names: ['r2', 'rms', 'ms']

model:
  model: "mnist"
