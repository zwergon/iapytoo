project: wgan
run: cnn1d
tracking_uri: null

dataset:
  path: "useless"
  num_workers: 2
  batch_size: 128


  
model:
  type: "gan"
  valuator: "gan"
  generator: g_gru
  discriminator: d_dft
  hidden_size: 128
  n_critic: 5
  noise_dim: 20
  lambda_gp: 10

training:
  tqdm: False
  n_steps_by_batch: 3
  epochs: 11
  loss: "useless"
  learning_rate: 0.0001
  optimizer: adam
  scheduler: step
  gamma: 0.7
  # betas:
  #   - 0.5
  #   - 0.99
